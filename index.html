<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Book Shelf</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@300;400;500;600&family=DM+Serif+Display&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-auth-compat.js"></script>
</head>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #F7F5F0;
  --surface: #FFFFFF;
  --surface2: #F0EDE6;
  --border: #E2DDD5;
  --text: #1A1814;
  --text-muted: #7A7368;
  --text-faint: #B5AFA5;
  --accent: #2D6A4F;
  --accent-light: #D8EFE3;
  --accent2: #5C4B8A;
  --accent2-light: #EAE5F5;
    --owned: #2D6A4F;
    --tag-ln: #2D6A4F;
    --tag-ln-bg: #D8EFE3;
    --tag-manga: #5C4B8A;
    --tag-manga-bg: #EAE5F5;
    --tag-novel: #8B5A3C;
    --tag-novel-bg: #F5E6D8;
    --tag-manga: #5C4B8A;
    --tag-manga-bg: #EAE5F5;
    --tag-artbook: #B8860B;
    --tag-artbook-bg: #FFF8DC;
    --tag-want: #FFD700;
    --tag-want-bg: #FFFACD;
    --radius: 12px;
  --radius-sm: 8px;
  --shadow: 0 1px 3px rgba(0,0,0,.06), 0 4px 12px rgba(0,0,0,.04);
  --shadow-hover: 0 4px 16px rgba(0,0,0,.12), 0 12px 32px rgba(0,0,0,.08);
}

body { font-family: 'Noto Sans Thai', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

/* ── NAVBAR ── */
nav {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 0 2rem;
  display: flex; align-items: center; height: 58px; gap: 1.5rem;
  position: sticky; top: 0; z-index: 100;
}
.logo { font-family: 'DM Serif Display', serif; font-size: 20px; color: var(--text); text-decoration: none; flex-shrink: 0; letter-spacing: -.3px; }
.logo span { color: var(--accent); }
.search-wrap { flex: 1; max-width: 340px; position: relative; margin-left: auto; }
.search-wrap svg { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); width: 15px; height: 15px; color: var(--text-faint); pointer-events: none; }
.search-input { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 50px; padding: 8px 16px 8px 36px; font-size: 13.5px; font-family: inherit; color: var(--text); outline: none; transition: border-color .2s, background .2s; }
.search-input:focus { border-color: var(--accent); background: var(--surface); }
.search-input::placeholder { color: var(--text-faint); }
.nav-actions { display: flex; gap: 8px; align-items: center; }
.btn-icon { width: 36px; height: 36px; border-radius: 50%; border: 1px solid var(--border); background: var(--surface); display: flex; align-items: center; justify-content: center; cursor: pointer; color: var(--text-muted); transition: background .15s, color .15s; font-size: 15px; text-decoration: none; }
.btn-icon:hover { background: var(--surface2); color: var(--text); }

/* ── PUBLISHER TABS ── */
.pub-strip {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 0 2rem;
  display: flex;
  gap: 8px;
  align-items: center;
  overflow-x: auto;
  scrollbar-width: thin;
  scrollbar-color: var(--border) var(--surface);
  height: 52px;
  flex-shrink: 0;
}
.pub-strip::-webkit-scrollbar {
  height: 6px;
}
.pub-strip::-webkit-scrollbar-track {
  background: var(--surface);
}
.pub-strip::-webkit-scrollbar-thumb {
  background: var(--border);
  border-radius: 3px;
}
.pub-strip::-webkit-scrollbar-thumb:hover {
  background: var(--text-faint);
}
.pub-tab {
  flex-shrink: 0;
  padding: 6px 16px;
  border-radius: 50px;
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  border: 1.5px solid var(--border);
  background: transparent;
  color: var(--text-muted);
  font-family: inherit;
  transition: all .18s;
  white-space: nowrap;
}
.pub-tab:hover { border-color: var(--accent); color: var(--accent); }
.pub-tab.active { background: var(--accent); border-color: var(--accent); color: #fff; }

/* ── TYPE TABS ── */
.type-bar {
  padding: 1rem 2rem 0.5rem;
  display: flex;
  gap: 6px;
  align-items: center;
  flex-wrap: wrap;
  position: relative;
}

.type-tab {
  padding: 6px 14px;
  border-radius: 50px;
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--text-muted);
  font-family: inherit;
  transition: all .15s;
  white-space: nowrap;
}

.type-tab:hover {
  background: var(--surface2);
  color: var(--text);
  border-color: var(--accent);
}

.type-tab.active {
  background: var(--accent);
  color: #fff;
  border-color: var(--accent);
  box-shadow: 0 1px 4px rgba(0,0,0,.08);
}

.type-count {
  font-size: 11px;
  background: rgba(255,255,255,.2);
  color: inherit;
  padding: 1px 6px;
  border-radius: 20px;
  margin-left: 4px;
  font-weight: 400;
}

/* Hamburger Menu Button */
.type-menu-btn {
  display: none;
  padding: 6px 14px;
  border-radius: 50px;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--text-muted);
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  gap: 6px;
  align-items: center;
  font-family: inherit;
  transition: all .15s;
}

.type-menu-btn:hover {
  background: var(--surface2);
  color: var(--text);
  border-color: var(--accent);
}

.type-menu-btn svg {
  width: 16px;
  height: 16px;
}

/* Type Menu Dropdown */
.type-menu {
  display: none;
  position: absolute;
  top: 100%;
  left: 0;
  right: 0;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  box-shadow: 0 4px 16px rgba(0,0,0,.08);
  padding: 0.5rem;
  z-index: 1000;
  margin-top: 8px;
  animation: slideDown .2s ease;
}

@keyframes slideDown {
  from {
    opacity: 0;
    transform: translateY(-8px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

.type-menu.open {
  display: block !important;
}

.type-menu .type-tab {
  display: flex !important;
  justify-content: space-between;
  align-items: center;
  width: 100%;
  text-align: left;
  padding: 10px 14px;
  margin: 4px 0;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--text-muted);
  border-radius: 50px;
}

.type-menu .type-tab:hover {
  background: var(--surface2);
  border-color: var(--accent);
  color: var(--text);
}

.type-menu .type-tab.active {
  background: var(--accent);
  border-color: var(--accent);
  color: #fff;
}

.type-menu .type-count {
  background: rgba(255,255,255,.2);
  color: inherit;
  padding: 1px 6px;
  border-radius: 20px;
  margin-left: 4px;
}

.filter-row {
  margin-left: auto;
  display: flex;
  gap: 6px;
  align-items: center;
}

.filter-chip {
  padding: 6px 14px;
  border-radius: 50px;
  font-size: 12px;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--text-muted);
  cursor: pointer;
  font-family: inherit;
  transition: all .15s;
}

.filter-chip:hover {
  border-color: var(--accent);
  color: var(--accent);
}

.filter-chip.active {
  background: var(--accent-light);
  border-color: var(--accent);
  color: var(--accent);
}

/* ── STATS STRIP ── */
.stats-strip { padding: 0 2rem .5rem; display: flex; gap: 1.5rem; font-size: 12.5px; color: var(--text-muted); align-items: center; }
.progress-mini { width: 80px; height: 4px; background: var(--border); border-radius: 2px; overflow: hidden; display: inline-block; vertical-align: middle; margin-left: 6px; }
.progress-fill { height: 100%; background: var(--accent); border-radius: 2px; transition: width .6s cubic-bezier(.4,0,.2,1); }
.scrape-btn { margin-left: auto; display: flex; align-items: center; gap: 6px; padding: 6px 14px; border-radius: 50px; border: 1.5px solid var(--accent); background: var(--surface); color: var(--accent); font-size: 12.5px; font-weight: 500; font-family: inherit; cursor: pointer; transition: all .18s; }
.scrape-btn:hover { background: var(--accent); color: #fff; }
.scrape-btn.loading { opacity: .7; pointer-events: none; }
.dot-live { width: 7px; height: 7px; border-radius: 50%; background: var(--accent); animation: blink 1.4s infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.25} }

/* ── GRID WRAP ── */
.grid-wrap { padding: .5rem 2rem 3rem; }
.section-label { font-size: 13px; font-weight: 500; color: var(--text-muted); margin-bottom: 1rem; display: flex; align-items: center; gap: 8px; }
.section-label::after { content: ''; flex: 1; height: 1px; background: var(--border); }

/* ── BOOK GRID (Default) ── */
.book-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
  gap: 16px;
}

/* ── SERIES GRID ── */
.series-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
  gap: 16px;
}

/* ── SERIES CARD ── */
.series-card {
  background: var(--surface);
  border-radius: var(--radius);
  border: 1px solid var(--border);
  overflow: hidden;
  cursor: pointer;
  transition: transform .2s cubic-bezier(.4,0,.2,1), box-shadow .2s, border-color .2s;
  position: relative;
  animation: fadeUp .3s both;
}
.series-card:hover { transform: translateY(-4px); box-shadow: var(--shadow-hover); border-color: #ccc; }
.series-card.all-owned { border-color: var(--accent); }
.series-card.all-owned::after { content: ''; position: absolute; inset: 0; border-radius: var(--radius); border: 2px solid var(--accent); pointer-events: none; }
.series-card.some-owned { border-color: #a8d5be; }

/* stack cover: show up to 3 covers fanned */
.series-cover-stack {
  aspect-ratio: 2/3;
  position: relative;
  background: var(--surface2);
  overflow: hidden;
}
.series-cover-stack .sc-img {
  position: absolute; inset: 0;
  width: 100%; height: 100%;
  object-fit: cover;
  transition: transform .3s;
}
.series-card:hover .sc-img { transform: scale(1.04); }
.series-cover-stack .sc-placeholder { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; font-size: 36px; color: var(--border); }

/* badges on cover */
.sc-type { position: absolute; top: 8px; left: 8px; font-size: 10px; font-weight: 600; padding: 3px 7px; border-radius: 20px; letter-spacing: .04em; }
.pill-ln { background: var(--tag-ln-bg); color: var(--tag-ln); }
.pill-manga { background: var(--tag-manga-bg); color: var(--tag-manga); }
.pill-novel { background: var(--tag-novel-bg); color: var(--tag-novel); }
.pill-artbook { background: var(--tag-artbook-bg); color: var(--tag-artbook); }
.pill-want { background: var(--tag-want-bg); color: var(--tag-want); border: 1px solid var(--tag-want); }
.sc-count {
  position: absolute; bottom: 8px; right: 8px;
  background: rgba(26,24,20,.65);
  color: #fff;
  font-size: 11px; font-weight: 600;
  padding: 3px 8px; border-radius: 20px;
  backdrop-filter: blur(4px);
}
.sc-owned-badge {
  position: absolute; top: 8px; right: 8px;
  background: var(--owned); color: #fff;
  font-size: 10px; font-weight: 600;
  padding: 3px 8px; border-radius: 20px;
}

.series-meta { padding: 10px 10px 12px; }
.series-title { font-size: 12.5px; font-weight: 600; line-height: 1.4; color: var(--text); display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; margin-bottom: 5px; }
.series-author { font-size: 11px; color: var(--text-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 6px; }

/* owned progress bar */
.series-progress { height: 3px; background: var(--border); border-radius: 2px; overflow: hidden; margin-bottom: 6px; }
.series-progress-fill { height: 100%; background: var(--accent); border-radius: 2px; transition: width .4s; }
.series-progress-label { font-size: 10.5px; color: var(--text-faint); }

/* set badges row */
.series-sets { display: flex; gap: 4px; flex-wrap: wrap; margin-top: 4px; }
.set-pill { font-size: 9px; font-weight: 700; padding: 2px 6px; border-radius: 3px; letter-spacing: .04em; text-transform: uppercase; }
.set-complete { background: var(--accent); color: #fff; }
.set-special  { background: var(--accent2); color: #fff; }
.set-ultimate { background: var(--text); color: #fff; }

/* ── BOOK CARD (inside series modal) ── */
.book-card { background: var(--surface); border-radius: var(--radius); border: 1px solid var(--border); overflow: hidden; cursor: pointer; transition: transform .18s, box-shadow .18s, border-color .18s; position: relative; }
.book-card:hover { transform: translateY(-3px); box-shadow: var(--shadow-hover); border-color: #ccc; }
.book-card.owned { border-color: var(--accent); }
.book-card.owned::after { content: ''; position: absolute; inset: 0; border-radius: var(--radius); border: 2px solid var(--accent); pointer-events: none; }
.cover { aspect-ratio: 2/3; background: var(--surface2); display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden; }
.cover img { width: 100%; height: 100%; object-fit: cover; transition: transform .3s; }
.book-card:hover .cover img { transform: scale(1.04); }
.cover-placeholder { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; color: var(--border); font-size: 32px; }
.owned-ribbon { position: absolute; top: 8px; right: 8px; background: var(--owned); color: #fff; font-size: 10px; font-weight: 600; padding: 3px 8px; border-radius: 20px; }
.want-ribbon { position: absolute; top: 8px; right: 36px; background: var(--tag-want-bg); color: var(--tag-want); font-size: 9px; font-weight: 600; padding: 3px 7px; border-radius: 14px; border: 1px solid var(--tag-want); display: flex; align-items: center; gap: 3px; }
.want-ribbon svg { width: 12px; height: 12px; }
.type-pill { position: absolute; top: 8px; left: 8px; font-size: 10px; font-weight: 600; padding: 3px 7px; border-radius: 20px; }
.book-meta { padding: 10px 10px 11px; }
.book-title { font-size: 12.5px; font-weight: 500; line-height: 1.45; color: var(--text); display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; margin-bottom: 4px; }
.book-author { font-size: 11px; color: var(--text-muted); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.book-price { font-size: 12px; font-weight: 600; color: var(--text-muted); margin-top: 5px; }
.own-toggle { width: 100%; margin-top: 7px; padding: 5px; border-radius: 6px; border: 1px solid var(--border); background: transparent; font-size: 11.5px; font-weight: 500; font-family: inherit; color: var(--text-muted); cursor: pointer; transition: all .15s; }
.own-toggle:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-light); }
.book-card.owned .own-toggle { background: var(--accent-light); color: var(--accent); border-color: var(--accent); }
.want-toggle { width: 100%; margin-top: 7px; padding: 5px; border-radius: 6px; border: 1px solid var(--tag-want); background: transparent; font-size: 11.5px; font-weight: 500; font-family: inherit; color: var(--tag-want); cursor: pointer; transition: all .15s; }
.want-toggle:hover { background: var(--tag-want); color: #000; }
.book-card.wanted .want-toggle { background: var(--tag-want); color: #000; }

/* ── EMPTY STATE ── */
.empty-state { text-align: center; padding: 4rem 2rem; color: var(--text-muted); }
.empty-state .e-icon { font-size: 48px; margin-bottom: 1rem; }
.empty-state p { font-size: 14px; }

/* ── MODALS (shared base) ── */
.modal-bg {
  position: fixed; inset: 0;
  background: rgba(20,18,14,.5);
  z-index: 200;
  display: none; align-items: center; justify-content: center;
  padding: 1rem;
  backdrop-filter: blur(3px);
}
.modal-bg.open { display: flex; }

/* ── SERIES MODAL ── */
.series-modal {
  background: var(--surface);
  border-radius: 18px;
  width: 100%; max-width: 760px;
  max-height: 92vh;
  overflow-y: auto;
  box-shadow: 0 24px 80px rgba(0,0,0,.25);
  animation: fadeUp .25s both;
}
.sm-header {
  padding: 1.5rem 1.5rem 1rem;
  position: sticky; top: 0;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  z-index: 2;
}
.sm-header-top { display: flex; align-items: flex-start; gap: 12px; }
.sm-type { font-size: 11px; font-weight: 600; letter-spacing: .06em; text-transform: uppercase; margin-bottom: 4px; }
.sm-title { font-family: 'DM Serif Display', serif; font-size: 22px; line-height: 1.3; flex: 1; }
.sm-author { font-size: 13px; color: var(--text-muted); margin-top: 4px; }
.sm-stats { display: flex; gap: 12px; align-items: center; margin-top: 10px; font-size: 12.5px; color: var(--text-muted); }
.sm-progress { flex: 1; height: 5px; background: var(--border); border-radius: 3px; overflow: hidden; }
.sm-progress-fill { height: 100%; background: var(--accent); border-radius: 3px; transition: width .5s; }
.sm-action-btn { padding: 6px 14px; border-radius: 50px; border: 2px solid var(--tag-novel); background: var(--tag-novel-bg); color: var(--tag-novel); font-size: 12px; font-weight: 600; cursor: pointer; transition: all .15s; white-space: nowrap; }
.sm-action-btn:hover { background: var(--tag-novel); color: #fff; }
.sm-action-btn.owned { background: #FFD700; border-color: #FFD700; color: #000; }
.sm-action-btn.owned:hover { background: #FFC000; }
.sm-body { padding: 1.25rem 1.5rem 1.5rem; }
.sm-section-label { font-size: 12px; font-weight: 600; color: var(--text-muted); margin-bottom: 10px; letter-spacing: .04em; text-transform: uppercase; display: flex; align-items: center; gap: 8px; }
.sm-section-label::after { content: ''; flex: 1; height: 1px; background: var(--border); }
.sm-vol-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 12px; margin-bottom: 1.5rem; }
.sm-sets-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 12px; margin-bottom: 1.5rem; }
.close-btn { width: 32px; height: 32px; flex-shrink: 0; border-radius: 50%; border: 1px solid var(--border); background: transparent; font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center; color: var(--text-muted); transition: all .15s; }
.close-btn:hover { background: var(--surface2); color: var(--text); }

/* ── BOOK DETAIL MODAL (layered on top) ── */
.detail-modal-bg {
  position: fixed; inset: 0;
  background: rgba(20,18,14,.35);
  z-index: 300;
  display: none; align-items: center; justify-content: center;
  padding: 1rem;
  backdrop-filter: blur(2px);
}
.detail-modal-bg.open { display: flex; }
.detail-modal {
  background: var(--surface);
  border-radius: 18px;
  width: 100%;
  max-width: 650px;
  max-height: 92vh;
  box-shadow: 0 24px 80px rgba(0,0,0,.3);
  animation: fadeUp .2s both;
  position: relative;
  display: flex;
  flex-direction: row;
  overflow: hidden;
}

/* ซ้าย: รูปปกเต็ม + พื้นหลังเบลอ */
.dm-cover {
  width: 240px;
  flex-shrink: 0;
  background: var(--surface2);
  position: relative;
  overflow: hidden;
  display: flex;
  align-items: center;
  justify-content: center;
}
/* Blurred background layer (desktop + mobile) */
.dm-cover::before {
  content: '';
  position: absolute;
  inset: -20px;
  background-image: inherit;
  background-size: cover;
  background-position: center;
  filter: blur(20px) brightness(0.7) saturate(1.2);
  transform: scale(1.15);
  z-index: 0;
}
.dm-cover img {
    width: 100% !important;
    height: 100% !important;
    object-fit: contain !important;
    object-position: center !important;
    display: block !important;
    position: relative !important;
    z-index: 1 !important;
    padding: 16px !important;
    margin: 0 !important;
  }
.dm-cover-placeholder {
  width: 100%; height: 100%;
  min-height: 320px;
  display: flex; align-items: center; justify-content: center;
  font-size: 56px; color: var(--border);
  position: relative;
  z-index: 1;
}
.dm-cover-type {
  position: absolute; top: 8px; left: 8px;
  font-size: 10px; font-weight: 700; padding: 3px 9px;
  border-radius: 20px; letter-spacing: .05em;
  text-transform: uppercase;
  z-index: 2;
}

/* ขวา: info scroll */
.dm-body {
  flex: 1;
  padding: 1.25rem 1.25rem 1.25rem;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  gap: 0;
}
.dm-type { font-size: 10px; font-weight: 700; letter-spacing: .08em; text-transform: uppercase; margin-bottom: 6px; }
.dm-title { font-family: 'DM Serif Display', serif; font-size: 19px; line-height: 1.35; margin-bottom: 4px; }

.btn-outline { width: 100%; padding: 9px; border-radius: var(--radius-sm); border: 1px solid var(--border); background: transparent; color: var(--text-muted); font-size: 13px; font-family: inherit; cursor: pointer; text-decoration: none; display: flex; align-items: center; justify-content: center; gap: 6px; transition: all .15s; }
.btn-outline:hover { border-color: var(--text-muted); color: var(--text); }

.close-abs {

/* Tablet & mobile: stack vertically with blur background */

/* ── TOAST ── */

/* ── AUTH ── */
.auth-login-screen {
  position: fixed; inset: 0;
  background: var(--bg);
  z-index: 9999;
  display: flex; align-items: center; justify-content: center;
  flex-direction: column;
  gap: 0;
}
.auth-login-screen.hidden { display: none; }
.auth-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 2.5rem 2rem;
  width: 100%;
  max-width: 360px;
  text-align: center;
  box-shadow: var(--shadow-hover);
}
.auth-logo {
  font-family: 'DM Serif Display', serif;
  font-size: 28px;
  color: var(--text);
  margin-bottom: 4px;
}
.auth-logo span { color: var(--accent); }
.auth-subtitle {
  font-size: 13.5px;
  color: var(--text-muted);
  margin-bottom: 2rem;
}
.btn-google {
  display: flex; align-items: center; justify-content: center; gap: 10px;
  width: 100%; padding: 11px 20px;
  border-radius: 50px;
  border: 1.5px solid var(--border);
  background: var(--surface);
  font-size: 14px; font-weight: 600; font-family: inherit;
  color: var(--text);
  cursor: pointer;
  transition: all .18s;
  box-shadow: 0 1px 4px rgba(0,0,0,.06);
}
.btn-google:hover { border-color: var(--accent); box-shadow: 0 2px 8px rgba(0,0,0,.1); }
.btn-google svg { flex-shrink: 0; }
.auth-divider { display: flex; align-items: center; gap: 10px; margin: 1rem 0; color: var(--text-faint); font-size: 12px; }
.auth-divider::before, .auth-divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }
.btn-email-auth {
  width: 100%; padding: 10px 20px;
  border-radius: 50px;
  border: 1.5px solid var(--border);
  background: transparent;
  font-size: 13.5px; font-weight: 500; font-family: inherit;
  color: var(--text-muted);
  cursor: pointer;
  transition: all .18s;
}
.btn-email-auth:hover { border-color: var(--accent); color: var(--accent); }

/* Email auth form */
.email-form { display: none; margin-top: 1rem; text-align: left; }
.email-form.show { display: block; }
.auth-input {
  width: 100%; padding: 10px 14px;
  border-radius: 10px;
  border: 1.5px solid var(--border);
  background: var(--surface2);
  font-size: 13.5px; font-family: inherit; color: var(--text);
  outline: none; margin-bottom: 8px;
  transition: border-color .2s;
}
.auth-input:focus { border-color: var(--accent); background: var(--surface); }
.btn-auth-submit {
  width: 100%; padding: 10px;
  border-radius: 50px;
  border: none;
  background: var(--accent);
  color: #fff; font-size: 13.5px; font-weight: 600; font-family: inherit;
  cursor: pointer;
  transition: opacity .15s;
  margin-top: 4px;
}
.btn-auth-submit:hover { opacity: .88; }
.auth-toggle { font-size: 12.5px; color: var(--text-muted); margin-top: 10px; cursor: pointer; }
.auth-toggle span { color: var(--accent); font-weight: 600; text-decoration: underline; cursor: pointer; }
.auth-error { font-size: 12px; color: #c0392b; margin-top: 6px; min-height: 18px; }

/* User avatar in navbar */
.nav-user {
  display: flex; align-items: center; gap: 8px;
  padding: 4px 12px 4px 4px;
  border-radius: 50px;
  border: 1px solid var(--border);
  background: var(--surface2);
  cursor: pointer;
  transition: all .15s;
  font-size: 12.5px;
  color: var(--text-muted);
  font-family: inherit;
}
.nav-user:hover { border-color: var(--accent); color: var(--text); }
.nav-avatar {
  width: 26px; height: 26px;
  border-radius: 50%;
  object-fit: cover;
  border: 1.5px solid var(--border);
}
.nav-avatar-placeholder {
  width: 26px; height: 26px;
  border-radius: 50%;

}
.nav-user-name { max-width: 90px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

/* User menu dropdown */
.user-menu-wrap { position: relative; }
.user-dropdown {
  display: none;
  position: absolute; top: calc(100% + 8px); right: 0;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  box-shadow: var(--shadow-hover);
  min-width: 180px;
  z-index: 500;
  overflow: hidden;
  animation: slideDown .18s ease;
}
.user-dropdown.open { display: block; }
.user-dropdown-item {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 16px;
  font-size: 13px;
  color: var(--text-muted);

  transition: background .12s;
  border: none; background: none; width: 100%; text-align: left; font-family: inherit;
}

</style>

// ── AUTH STATE ──
let currentUser = null;

// helper: returns Firebase ref path scoped to current user
function userRef(path) {
  if (!currentUser) throw new Error('Not authenticated');
  return firebaseDB.ref(`users/${currentUser.uid}/${path}`);
}

// ── AUTH UI ──
function toggleEmailForm() {

}

function switchAuthMode() {

    // Reset state
    state.owned = {};
    state.want = {};

});

// ใช้ Firebase (ไม่ต้องรัน python scraper.py แล้ว)
const DB_KEY   = 'bookshelf_v1';
const OWN_KEY  = 'bookshelf_owned';
const WANT_KEY = 'bookshelf_want';

let state = {
  books: [], owned: {}, want: {},
  publisher: 'all', type: 'all',
  search: '', sort: 'title'
};

// ══ LOAD ══
async function loadState() {
  if (!currentUser) return;
  console.log('[loadState] Starting for user:', currentUser.uid);

  try {
    // โหลด books จาก Firebase (shared path - ทุกคนใช้ร่วมกัน)
    const booksSnap = await firebaseDB.ref('books').once('value');
    const booksData = booksSnap.val();

    if (booksData && Array.isArray(booksData)) {
      state.books = booksData;
    } else if (booksData && typeof booksData === 'object') {
      state.books = Object.values(booksData);
    } else {
      state.books = [];
      // Fallback to localStorage
      const localBooks = localStorage.getItem(DB_KEY);
      if (localBooks) state.books = JSON.parse(localBooks);
    }

    // โหลด owned/want จาก path ของ user คนนี้เท่านั้น
    const ownedSnap = await userRef('owned').once('value');
    const wantSnap  = await userRef('want').once('value');

    const ownedData = ownedSnap.val() || {};
    const wantData  = wantSnap.val()  || {};

    // deserialize Base64 encoded keys
    state.owned = {};
    state.want  = {};

    Object.keys(ownedData).forEach(encodedKey => {
      try { state.owned[atob(encodedKey)] = ownedData[encodedKey]; }
      catch(e) { state.owned[encodedKey] = ownedData[encodedKey]; }
    });

    Object.keys(wantData).forEach(encodedKey => {
      try { state.want[atob(encodedKey)] = wantData[encodedKey]; }
      catch(e) { state.want[encodedKey] = wantData[encodedKey]; }
    });

    console.log(`✅ Books: ${state.books.length}, Owned: ${Object.keys(state.owned).length}, Want: ${Object.keys(state.want).length}`);

  } catch(e) {
    console.error('[loadState] Error:', e.message);
    state.books = [];
    state.owned = {};
    state.want  = {};
    try {
      const localBooks = localStorage.getItem(DB_KEY);
      if (localBooks) state.books = JSON.parse(localBooks);
    } catch(e2) {}
  }
}

async function saveState() {
  if (!currentUser) { console.warn('[saveState] Not authenticated'); return; }
  if (!state.books || state.books.length === 0) {
    console.warn('[saveState] Not saving empty books array!');
    return;
  }

  try {
    const sanitizeKey = (key) => btoa(key);
    const sanitizedOwned = {};
    const sanitizedWant  = {};

    Object.keys(state.owned).forEach(key => { sanitizedOwned[sanitizeKey(key)] = state.owned[key]; });
    Object.keys(state.want).forEach(key  => { sanitizedWant[sanitizeKey(key)]  = state.want[key]; });

    // books ยัง shared (เขียนที่ root)
    // owned/want แยกตาม user
    await Promise.all([
      firebaseDB.ref('books').set(state.books),
      userRef('owned').set(sanitizedOwned),
      userRef('want').set(sanitizedWant),
    ]);

    // Backup ใน localStorage
    localStorage.setItem(DB_KEY,   JSON.stringify(state.books));
    localStorage.setItem(OWN_KEY,  JSON.stringify(state.owned));
    localStorage.setItem(WANT_KEY, JSON.stringify(state.want));

    console.log('💾 Saved:', state.books.length, 'books |', Object.keys(state.owned).length, 'owned |', Object.keys(state.want).length, 'want');
  } catch(e) {
    console.error('[saveState] Error:', e.message);
  }
}

// ══════════════════════════════════════════════════
// SERIES GROUPING
// ══════════════════════════════════════════════════

// คีย์เวิร์ดที่ใช้แยก set ออกจาก volume ปกติ
const SET_PATTERNS = [
  { key: 'complete', re: /complete\s+set/i },
  { key: 'special',  re: /special\s+set/i },
  { key: 'ultimate', re: /ultimate\s+set/i },
  { key: 'boxset',   re: /box\s*set|collection\s+box/i },
  { key: 'shortstory', re: /short\s+story\s+set/i },
];

function classifyBook(title) {
  for (const p of SET_PATTERNS) {
    if (p.re.test(title)) return p.key;
  }
  return 'volume';
}

function extractSeriesKey(title) {
  // ตัด set keywords ออกก่อน
  let t = title
    .replace(/complete\s+set/i, '')
    .replace(/special\s+set/i, '')
    .replace(/ultimate\s+set/i, '')
    .replace(/box\s*set|collection\s+box/i, '')
    .replace(/short\s+story\s+set/i, '')
    .replace(/\[.*?\]/g, '')   // ตัด [แถมฟรี!...]
    .trim();

  // ตัด "เล่ม X" ออก (รองรับทั้งเลขอาราบิกและไทย)
  t = t.replace(/\s+เล่ม\s+[\d๐-๙]+.*/i, '').trim();

  // ตัด Alter/Le/Ep X ออก
  t = t.replace(/\s+(Alter|Le|Ep)\s+\d+.*/i, '').trim();

  // ตัด Vol./Volume X ออก
  t = t.replace(/\s+[Vv]ol\.?\s*\d+.*/i, '').trim();

  return t.toLowerCase().replace(/\s+/g, ' ').trim();
}

function getVolumeNumber(title) {
  const m = title.match(/เล่ม\s+([\d๐-๙]+)/i);
  if (!m) return 999;
  const s = m[1];
  // แปลงเลขไทย
  const thai = '๐๑๒๓๔๕๖๗๘๙';
  if (/[๐-๙]/.test(s)) {
    return parseInt([...s].map(c => thai.indexOf(c)).join(''));
  }
  return parseInt(s);
}

function groupBySeries(books) {
  const map = {};

  books.forEach(b => {
    const cls = classifyBook(b.Title);
    const key = extractSeriesKey(b.Title);
    if (!key) return;

    if (!map[key]) {
      map[key] = {
        key, name: '', author: '', type: b.Type, publisher: b.Publisher,
        volumes: [], sets: {}
      };
    }

    const g = map[key];

    if (cls === 'volume') {
      g.volumes.push(b);
      // ใช้ชื่อซีรีส์ตรงๆ จาก title (ก่อน เล่ม)
      const nameMatch = b.Title.replace(/\[.*?\]/g, '').trim().match(/^(.+?)\s+เล่ม\s+[\d๐-๙]/i);
      if (nameMatch && !g.name) g.name = nameMatch[1].trim();
      if (!g.author && b.Author) g.author = b.Author;
    } else {
      g.sets[cls] = b;
      if (!g.name) {
        // ดึงชื่อจาก set title
        const cleaned = b.Title
          .replace(/complete\s+set/i,'').replace(/special\s+set/i,'')
          .replace(/ultimate\s+set/i,'').replace(/box\s*set|collection\s+box/i,'')
          .replace(/\[.*?\]/g,'').trim();
        if (cleaned) g.name = cleaned;
      }
    }
  });

  // ถ้าไม่มีชื่อดีๆ ใช้ key แทน
  Object.values(map).forEach(g => {
    if (!g.name) g.name = g.key;
    // เรียง volumes ตามเลขเล่ม
    g.volumes.sort((a, b) => getVolumeNumber(a.Title) - getVolumeNumber(b.Title));
  });

  // เรียง group ตามชื่อ
  return Object.values(map).sort((a, b) => a.name.localeCompare(b.name, 'th'));
}

function countOwned(group) {
  const allBooks = [
    ...group.volumes,
    ...Object.values(group.sets)
  ];
  return allBooks.filter(b => state.owned[b.Link]).length;
}

function countTotal(group) {
  return group.volumes.length + Object.keys(group.sets).length;
}

// ══════════════════════════════════════════════════
// FILTER
// ══════════════════════════════════════════════════
function getFilteredBooks() {
  let books = [...state.books];
  if (state.publisher !== 'all') books = books.filter(b => b.Publisher === state.publisher);
  if (state.type === 'owned')    books = books.filter(b => state.owned[b.Link]);
  else if (state.type === 'want') books = books.filter(b => state.want[b.Link]);
  else if (state.type !== 'all') books = books.filter(b => b.Type === state.type);
  if (state.search.trim()) {
    const q = state.search.trim().toLowerCase();
    books = books.filter(b =>
      (b.Title||'').toLowerCase().includes(q) ||
      (b.Author||'').toLowerCase().includes(q)
    );
  }
  return books;
}

// ══════════════════════════════════════════════════
// RENDER
// ══════════════════════════════════════════════════
function renderPubTabs() {
  const strip = document.getElementById('pubStrip');
  strip.innerHTML = '';
  const mkBtn = (label, val) => {
    const b = document.createElement('button');
    b.className = 'pub-tab' + (state.publisher === val ? ' active' : '');
    b.textContent = label;
    b.onclick = () => { state.publisher = val; renderPubTabs(); renderGrid(); };
    return b;
  };
  strip.appendChild(mkBtn('ทั้งหมด', 'all'));
  [...new Set(state.books.map(b => b.Publisher).filter(Boolean))].forEach(p => strip.appendChild(mkBtn(p, p)));
  const add = document.createElement('button');
  add.className = 'pub-tab';
  add.textContent = '+ เพิ่มสำนักพิมพ์';
  add.style.cssText = 'border-style:dashed;color:var(--text-faint)';
  add.onclick = () => { window.location.href = 'setting/Setting.html'; };
  strip.appendChild(add);
}

function renderGrid() {
  console.log('[renderGrid] Starting, filtered:', getFilteredBooks().length);
  const filtered = getFilteredBooks();
  const grid     = document.getElementById('bookGrid');
  const empty    = document.getElementById('emptyState');

  // update counts
  const allB = state.publisher === 'all' ? state.books : state.books.filter(b => b.Publisher === state.publisher);
  
  // Desktop counts
  const counts = [
    { id: 'cnt-all', value: allB.length },
    { id: 'cnt-LN', value: allB.filter(b => b.Type === 'LN').length },
    { id: 'cnt-Novel', value: allB.filter(b => b.Type === 'Novel').length },
    { id: 'cnt-Manga', value: allB.filter(b => b.Type === 'Manga').length },
    { id: 'cnt-Artbook', value: allB.filter(b => b.Type === 'Artbook').length },
    { id: 'cnt-owned', value: allB.filter(b => state.owned[b.Link]).length },
    { id: 'cnt-want', value: allB.filter(b => state.want[b.Link]).length }
  ];
  
  counts.forEach(({ id, value }) => {
    const el = document.getElementById(id);
    if (el) el.textContent = value;
  });
  
  // Mobile menu counts (prefix with m-)
  counts.forEach(({ id, value }) => {
    const mobileEl = document.getElementById('m-' + id);
    if (mobileEl) mobileEl.textContent = value;
  });

  const total = allB.length;
  const owned = allB.filter(b => state.owned[b.Link]).length;
  const pct   = total ? Math.round(owned / total * 100) : 0;
  document.getElementById('statOwned').textContent = owned;
  document.getElementById('statTotal').textContent = total;
  document.getElementById('statPct').textContent   = pct + '%';
  document.getElementById('progressFill').style.width = pct + '%';

  const typeNames = { all:'ทั้งหมด', LN:'Light Novel', Novel:'Novel', Manga:'Manga', Artbook:'Artbook', owned:'มีแล้ว', want:'อยากได้' };
  document.getElementById('sectionLabel').textContent = typeNames[state.type] || 'ทั้งหมด';

  if (filtered.length === 0) {
    console.log('[renderGrid] No books to display');
    grid.innerHTML = '';
    empty.style.display = 'block';
    return;
  }
  empty.style.display = 'none';

  const groups = groupBySeries(filtered);
  console.log('[renderGrid] Groups:', groups.length);

  grid.innerHTML = groups.map((g, i) => {
    const tot     = countTotal(g);
    const own     = countOwned(g);
    const pctG    = tot ? Math.round(own / tot * 100) : 0;
    const allOwn  = own === tot && tot > 0;
    const someOwn = own > 0 && own < tot;
    const delay   = Math.min(i * 25, 400);

    // ภาพปกจาก volume แรกที่มีรูป
    const coverBook = g.volumes.find(b => b.Image) || Object.values(g.sets).find(b => b.Image);
    const imgHtml = coverBook?.Image
      ? `<img class="sc-img" src="${coverBook.Image}" alt="${g.name}" onerror="this.style.display='none'">`
      : `<div class="sc-placeholder">${g.type === 'LN' ? '📖' : '📚'}</div>`;

    // badges: set types + LN/Manga (ถ้าไม่มี set ใดเลย จึงแสดง type)
    const setKeys = Object.keys(g.sets);
    const SET_LABEL = {
      complete:   { cls: 'set-complete',  label: 'Complete' },
      special:    { cls: 'set-special',   label: 'Special'  },
      ultimate:   { cls: 'set-ultimate',  label: 'Ultimate' },
      boxset:     { cls: 'set-ultimate',  label: 'Box Set'  },
      shortstory: { cls: 'set-complete',  label: 'Short Story' },
    };
    const setBadges = setKeys.map(k => {
      const s = SET_LABEL[k] || { cls: 'set-complete', label: k };
      return `<span class="set-pill ${s.cls}">${s.label}</span>`;
    }).join('');

    // type badge เล็กๆ มุมบนซ้ายของรูป (เอาไว้แค่ใน cover ไม่แสดงใน meta)
    const typePillMap = {
      'LN': { class: 'pill-ln', label: 'LN' },
      'Novel': { class: 'pill-novel', label: 'N' },
      'Manga': { class: 'pill-manga', label: 'MG' },
      'Artbook': { class: 'pill-artbook', label: 'AB' }
    };
    const typePill = typePillMap[g.type] || { class: 'pill-ln', label: 'LN' };
    const typePillClass = typePill.class;
    const typePillLabel = typePill.label;

    return `
    <div class="series-card ${allOwn ? 'all-owned' : someOwn ? 'some-owned' : ''}"
         style="animation-delay:${delay}ms"
         onclick="openSeriesModal(${i})"
         data-idx="${i}">
      <div class="series-cover-stack">
        ${imgHtml}
        <div class="sc-type ${typePillClass}">${typePillLabel}</div>
        <div class="sc-count">${tot} เล่ม</div>
        ${allOwn ? `<div class="sc-owned-badge">✓ ครบ</div>` : ''}
      </div>
      <div class="series-meta">
        <div class="series-title">${g.name}</div>
        ${g.author ? `<div class="series-author">${g.author}</div>` : ''}
        <div class="series-progress">
          <div class="series-progress-fill" style="width:${pctG}%"></div>
        </div>
        <div class="series-progress-label">${own}/${tot} เล่ม${own > 0 ? ` (${pctG}%)` : ''}</div>
        ${setBadges ? `<div class="series-sets">${setBadges}</div>` : ''}
      </div>
    </div>`;
  }).join('');

  // store for modal access
  window._groups = groups;
}

  document.body.style.overflow = 'hidden';

function bookCardHtml(b, setLabel) {
  const isOwned = !!state.owned[b.Link];

  const labelPill = setLabel
    ? `<div class="type-pill" style="background:${setLabel==='complete'?'var(--accent)':setLabel==='special'?'var(--accent2)':'var(--text)'};color:#fff">${setLabel}</div>`
    : '';

  return `
  <div class="book-card ${isOwned ? 'owned' : ''} ${isWant ? 'wanted' : ''}" onclick="openDetailModal(${safeBook})">
    <div class="cover">
      ${b.Image
        ? `<img src="${b.Image}" alt="${b.Title}" onerror="this.parentElement.innerHTML='<div class=cover-placeholder>📖</div>'">`
        : `<div class="cover-placeholder">📖</div>`}
      ${labelPill}
      ${isOwned ? `<div class="owned-ribbon">✓</div>` : ''}
      ${isWant ? `<div class="want-ribbon"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>อยากได้</div>` : ''}
    </div>

      <div class="book-title">${b.Title}</div>
      <div class="book-price">${b.Price || ''}</div>
      <button class="own-toggle" onclick="event.stopPropagation();toggleOwn('${b.Link}')">
        ${isOwned ? '✓ มีแล้ว' : '+ เพิ่ม'}
      </button>
      <button class="want-toggle" onclick="event.stopPropagation();toggleWant('${b.Link}')">
        ${isWant ? '<svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor" style="vertical-align:middle;margin-right:4px"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>อยากได้แล้ว' : '+ อยากได้'}

/**
 * smartFitImage — สำหรับ mobile ใช้รูปเป็นพื้นหลังเบลอ
 */
function smartFitImage(imgEl, containerEl) {
  imgEl.onload = () => {
    // ตั้งค่ารูปเป็นพื้นหลังสำหรับ blur effect
    containerEl.style.backgroundImage = `url('${imgEl.src}')`;
    containerEl.style.backgroundSize = 'cover';
    containerEl.style.backgroundPosition = 'center';
  };
}

function openDetailModal(book) {
  _currentDetailBook = book;

  // ── ปกซ้าย ──
  const cover = document.getElementById('dmCover');
  const typePillMap = {
    'LN': { class: 'pill-ln', label: 'Light Novel' },
    'Novel': { class: 'pill-novel', label: 'Novel' },
    'Manga': { class: 'pill-manga', label: 'Manga' },
    'Artbook': { class: 'pill-artbook', label: 'Artbook' }
  };
  const typePill = typePillMap[book.Type] || { class: 'pill-ln', label: 'Light Novel' };
  const pillClass = typePill.class;
  const pillLabel = typePill.label;
  // reset blur bg จาก modal ครั้งก่อน
  cover.style.backgroundImage = '';
  if (book.Image) {
    cover.innerHTML = `
      <img src="${book.Image}" alt="${book.Title}"
           onerror="this.parentElement.innerHTML='<div class=dm-cover-placeholder>📖</div>'">
      <div class="dm-cover-type ${pillClass}">${pillLabel}</div>`;

  } else {
    cover.innerHTML = `
      <div class="dm-cover-placeholder">${book.Type === 'LN' ? '📖' : '📚'}</div>
      <div class="dm-cover-type ${pillClass}">${pillLabel}</div>`;

  document.getElementById('dmGenre').textContent  = book.Genre || '—';

async function scrapeNow() {
  const btn = document.getElementById('scrapeBtn');
  btn.classList.add('loading');
  btn.innerHTML = '<span class="dot-live"></span> กำลังดึงข้อมูล…';
  showToast('⏳', 'กำลังดึงข้อมูลจากสำนักพิมพ์…', 'อาจใช้เวลา 1-2 นาที');
  
  try {
    // ต้องรัน python scraper.py ในเครื่องเท่านั้น
    const res = await fetch('http://localhost:5000/scrape', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({})
    });
    
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    
    if (data.books && data.books.length > 0) {
      state.books = data.books;
    }
    
    // อัพโหลดขึ้น Firebase อัตโนมัติ
    await uploadToFirebase();
    renderPubTabs();
    renderGrid();
    
    showToast('✅', 'ดึงข้อมูลสำเร็จ', `${data.scraped || data.total} เล่ม`);
    console.log('✅ Scraped:', data);
  } catch(e) {
    console.error('Scrape error:', e);
    showToast('❌', 'Scrape ไม่สำเร็จ', 'ต้องรัน python scraper.py ก่อน');
  }
  
  btn.classList.remove('loading');
  btn.innerHTML = '<span class="dot-live"></span> Scrape Now';
}

async function uploadToFirebase() {
  if (!currentUser) return;
  console.log('📤 Uploading to Firebase...');
  try {
    await firebaseDB.ref('books').set(state.books);
    const sanitizeKey = (key) => btoa(key);
    const sanitizedOwned = {};
    const sanitizedWant  = {};
    Object.keys(state.owned).forEach(k => { sanitizedOwned[sanitizeKey(k)] = state.owned[k]; });
    Object.keys(state.want).forEach(k  => { sanitizedWant[sanitizeKey(k)]  = state.want[k]; });
    await userRef('owned').set(sanitizedOwned);
    await userRef('want').set(sanitizedWant);
    console.log('✅ Uploaded to Firebase');
  } catch(e) {
    console.error('Upload error:', e);
  }
}

async function refreshFromAPI() {
  if (!currentUser) { showToast('⚠️', 'กรุณาเข้าสู่ระบบก่อน', ''); return; }
  showToast('⏳', 'กำลังโหลดข้อมูล…', '');

  try {
    const booksSnap = await firebaseDB.ref('books').once('value');
    const booksData = booksSnap.val();

    if (booksData && Array.isArray(booksData)) {
      state.books = booksData;
    } else if (booksData && typeof booksData === 'object') {
      state.books = Object.values(booksData);
    }

    const ownedSnap = await userRef('owned').once('value');
    const wantSnap  = await userRef('want').once('value');
    const ownedData = ownedSnap.val() || {};
    const wantData  = wantSnap.val()  || {};

    state.owned = {};
    state.want  = {};
    Object.keys(ownedData).forEach(k => { try { state.owned[atob(k)] = ownedData[k]; } catch(e) { state.owned[k] = ownedData[k]; } });
    Object.keys(wantData).forEach(k  => { try { state.want[atob(k)]  = wantData[k];  } catch(e) { state.want[k]  = wantData[k]; } });

    renderPubTabs();
    renderGrid();
    showToast('✅', 'โหลดข้อมูลสำเร็จ', `${state.books.length} เล่ม`);
  } catch(e) {
    console.error('Refresh error:', e);
    showToast('❌', 'ไม่สามารถโหลดได้', 'ตรวจสอบ Firebase');
  }
}

function exportExcel() {
  fetch('http://localhost:5000/export', {
    method: 'POST', headers: {'Content-Type':'application/json'},
    body: JSON.stringify({ books: state.books, owned: state.owned })
  }).then(r => r.blob()).then(blob => {
    const a = Object.assign(document.createElement('a'), {
      href: URL.createObjectURL(blob), download: 'my_booklist.xlsx'
    });
    a.click();
    console.log('✅ Exported Excel');
    showToast('✅', 'Export สำเร็จ', 'my_booklist.xlsx');
  }).catch(() => exportCSV());
}

function exportCSV() {
  const headers = ['Title','Author','Illustrator','Type','Price','Publisher','Genre','Owned','Link'];
  const rows = state.books.map(b => headers.map(h =>
    h === 'Owned' ? (state.owned[b.Link] ? 'Yes' : 'No') : (b[h] || '')
  ));
  const csv = [headers, ...rows].map(r => r.map(c => `"${String(c).replace(/"/g,'""')}"`).join(',')).join('\n');
  const blob = new Blob(['\uFEFF'+csv], {type:'text/csv;charset=utf-8'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'my_booklist.csv'; a.click();
  console.log('✅ Exported CSV');
  showToast('✅', 'Export CSV สำเร็จ', 'my_booklist.csv');
}

// ══════════════════════════════════════════════════
// TOAST
// ══════════════════════════════════════════════════
let _toastTimer;
function showToast(icon, text, sub) {
  clearTimeout(_toastTimer);
  document.getElementById('toastIcon').textContent  = icon;
  document.getElementById('toastText').textContent  = text;
  document.getElementById('toastSub').textContent   = sub || '';
  document.getElementById('toast').classList.add('show');
  _toastTimer = setTimeout(() => document.getElementById('toast').classList.remove('show'), 4000);
}
